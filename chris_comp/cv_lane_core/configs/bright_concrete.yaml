# Profile fitted to bright-concrete footage with LOW-contrast white lines
# (e.g. /home/chris/Downloads/test.mp4). Measured near-field stats: concrete
# V~150, white line is the bright tail at V~200-208, saturation ~18 everywhere.
#
# Key differences vs default.yaml (which assumes dark asphalt + bright paint):
#   * combine: white   -> the not-asphalt AND-gate is dropped. On bright concrete
#     the line (V~205) is below the asphalt v_max, so the gate wrongly erased it.
#   * lower brightness floor tuned to the measured line tail, not a generic 200.
#   * smaller min_area (lower-res 498x368 video, thinner lines).

blur_ksize: 5
blur_iters: 1

# Keep the road, drop the top (background) and the red robot bumper at the bottom.
roi_poly:
  - [0.0, 0.30]
  - [1.0, 0.30]
  - [1.0, 0.88]
  - [0.0, 0.88]

combine: white

white:
  h_min: 0
  h_max: 179
  s_min: 0
  s_max: 70        # paint + concrete are both desaturated here
  v_min: 188       # measured: concrete ~150, line tail ~200+
  v_max: 255

asphalt:
  enabled: false   # off — see note above

adaptive:
  enabled: true
  k: 2.2           # floor = mean + 2.2*std ~ 187, sits just under the line tail
  period: 5
  band: [0.50, 0.90]

open_ksize: 3

line:
  min_area: 40         # lower res + thinner lines than the 640-wide default
  max_area: 60000
  min_elongation: 3.0  # these lines are straight diagonals
  max_fill: 0.80
  orientation_gate: false
  angle_center_deg: 90.0
  angle_tol_deg: 45.0
  hough_min_len_px: 0

temporal:
  window: 3
  min_hits: 2

meters_per_px: 0.0
notes: "fitted to bright-concrete low-contrast white-line footage (test.mp4)"
