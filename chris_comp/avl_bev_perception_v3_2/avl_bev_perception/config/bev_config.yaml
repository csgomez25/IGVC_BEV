# =============================================================================
#  AVL BEV Perception Config (v3.2.2) — IGVC AutoNav
#
#  3x ZED X cameras + IGVC-tuned hybrid segmentation (HSV + Otsu + optional ONNX).
#  Decoupled perception/visualization timers.
#  Optimized for Jetson AGX Orin + tank/differential drive.
#
#  Camera serial mapping (v3.2.2: aligned with the team's IGVC_ROS2 stack at
#  references/parsa_igvc/src/avros_bringup/launch/sensors.launch.py —
#  "Verified 2026-04-24 via per-port enumeration." Pre-v3.2.2 had left/right
#  swapped):
#    Left   : ZED X (S/N 43779087)
#    Front  : ZED X (S/N 42569280)
#    Right  : ZED X (S/N 49910017)
#
#  Mount poses derived from the team measurement sketch (inches, IMU-based
#  footprint origin, sketch axes X=right Y=forward Z=up). Converted here to
#  REP-103 (X=forward, Y=left, Z=up) and meters. See docs sketch + Section 7
#  of CHANGELOG_AND_DESIGN_v3.2.docx.
# =============================================================================

bev_perception_node:
  ros__parameters:

    # ---- BEV grid --------------------------------------------------------
    bev:
      x_range: [-10.0, 15.0]      # behind .. ahead (meters)
      y_range: [-10.0, 10.0]      # right .. left
      resolution: 0.05            # meters per pixel
      # Tighter floor than v2 so painted lines / potholes survive the filter.
      # Classes in GROUND_PLANE_CLASSES (see bev_perception_node.py) get an
      # exemption from the lower bound regardless of this value.
      height_range: [-0.05, 2.5]

    # ---- Mount poses (base_link, REP-103: X fwd, Y left, Z up) -----------
    # Origin = IMU-based footprint (sketch (0,0,0)).
    # Conversion from sketch:  X_rep = Y_sketch (inches → m),
    #                          Y_rep = -X_sketch (inches → m),
    #                          Z_rep =  Z_sketch (inches → m).
    # Topic-path defaults below assume zed-ros2-wrapper v5.x.
    # For v4.x bringups: rgb path is /zed_<cam>/zed_node/rgb/image_rect_color
    # and info path is /zed_<cam>/zed_node/rgb/camera_info — override here
    # or via `ros2 param set`.
    cameras:
      left:                       # ZED X 43779087  — sketch (-11.5, 4, 19.5) in
        mount_x:  0.102           # 4    in fwd  -> 0.1016 m
        mount_y:  0.292           # 11.5 in left -> 0.2921 m
        mount_z:  0.495           # 19.5 in up   -> 0.4953 m
        mount_yaw: 1.5708         # +90 deg, looking left (measured ~exactly 90)
        rgb_topic:   /zed_left/zed_node/rgb/color/rect/image
        depth_topic: /zed_left/zed_node/depth/depth_registered
        info_topic:  /zed_left/zed_node/rgb/color/rect/camera_info
        cloud_topic: /zed_left/zed_node/point_cloud/cloud_registered
      front:                      # ZED X 42569280  — sketch (0, 16, 19.5) in
        mount_x:  0.406           # 16   in fwd  -> 0.4064 m
        mount_y:  0.000
        mount_z:  0.495           # 19.5 in up
        mount_yaw: 0.0
        rgb_topic:   /zed_front/zed_node/rgb/color/rect/image
        depth_topic: /zed_front/zed_node/depth/depth_registered
        info_topic:  /zed_front/zed_node/rgb/color/rect/camera_info
        cloud_topic: /zed_front/zed_node/point_cloud/cloud_registered
      right:                      # ZED X 49910017  — sketch (11.5, 4, 19.5) in
        mount_x:  0.102           # 4    in fwd
        mount_y: -0.292           # 11.5 in right (negative in REP-103)
        mount_z:  0.495           # 19.5 in up
        mount_yaw: -1.5708        # -90 deg, looking right
        rgb_topic:   /zed_right/zed_node/rgb/color/rect/image
        depth_topic: /zed_right/zed_node/depth/depth_registered
        info_topic:  /zed_right/zed_node/rgb/color/rect/camera_info
        cloud_topic: /zed_right/zed_node/point_cloud/cloud_registered

    # ---- Kiwicampus / Nav2 joint-deployment adapter (path A) -------------
    # When enabled, ALSO publishes per-camera `/perception/<cam>/{semantic_mask,
    # semantic_confidence, semantic_points, label_info}` so Parsa's
    # `kiwicampus/semantic_segmentation_layer` Nav2 plugin can consume our
    # Tier 1 segmentation directly. Existing /bev/* outputs are unaffected.
    # See "Integration with Parsa's Stack" in CLAUDE.md for the contract.
    # Default OFF — standalone vision testing is unchanged.
    kiwicampus:
      enabled: false
      # Namespace prefix for the per-camera contract topics.
      #   '/perception'     (default) — drops straight into Parsa's
      #                       nav2_params_humble.yaml semantic_layer sources,
      #                       which already point at /perception/<cam>/semantic_*.
      #                       Use this to FILL his configured-but-empty left/right
      #                       sources (no collision — his perception_node is
      #                       front-only).
      #   '/bev_perception' — run ALONGSIDE his front perception_node without a
      #                       topic collision; then add the prefixed topics as an
      #                       extra observation_source under his semantic_layer.
      topic_prefix: /perception
      # Class names emitted in the latched LabelInfo. IDs 0-3 + 255 use
      # Parsa's class_map.yaml names verbatim (free / lane_white /
      # barrel_orange / pothole / unknown) so his nav2_params_humble.yaml
      # class_types: [...] lists pick them up. IDs 4 (person) and 5
      # (drivable) keep our names — kiwicampus silently ignores names not
      # in class_types, which is the intended behavior for Tier-2-only
      # classes.

    depth:
      min: 0.3
      max: 12.0                   # IGVC course is small, drop far depth noise

    # ---- Segmentation ----------------------------------------------------
    segmentation:
      enabled: true
      tier2_model_path: ''        # leave empty until you have an IGVC-trained ONNX
      device: 'cuda'              # 'cuda' or 'cpu'
      min_line_area_px:   30      # drop tiny white speckle (paint chips, glints)
      min_barrel_area_px: 200     # drop small orange specks

      # v3.2 — Auto-HSV calibration at startup (Twistopher-inspired).
      # Captures N frames per camera before going live, samples the asphalt
      # color, and shifts white V_min / orange S_min so they sit above the
      # asphalt baseline. Eliminates manual recalibration between runs as
      # lighting changes (sunrise -> overcast -> noon sun).
      # Set false ONLY if testing in a fully controlled lighting environment.
      auto_calibrate:           true
      auto_calibrate_n_samples: 30      # ~1 sec at 30Hz per camera

      # Tier 1b — Otsu bright-object pass for potholes / unclassified bright stuff.
      # Inspired by Monash MCAV's IGVC 2025 unified lane+pothole detection. Catches
      # painted pothole circles and other bright-on-asphalt features without needing
      # a learned model. Detected pixels become CLASS_POTHOLE in the seg mask.
      # Disable if it's false-positiving on bright background (e.g. white concrete).
      bright:
        enabled:     true
        min_area_px:   40         # drop speckle / paint chips
        max_area_px: 8000         # drop huge bright regions (sky, walls, glare)
        blur_px:        5         # GaussianBlur kernel size before Otsu

      # Tier 1c — HSV thresholds (OpenCV: H 0-179, S 0-255, V 0-255).
      # These are the DEFAULTS / FALLBACKS. When auto_calibrate is true, the
      # actual venue thresholds are computed at startup and override v_min /
      # s_min for white and orange respectively.
      hsv:
        white:                    # IGVC lane lines
          # 2026-05-13: v_min 180 -> 200, s_max kept at 60 to match Parsa's
          # avros_perception/config/perception.yaml after his white-on-grass
          # field retune (Parsa: lane_low=[0,0,200], lane_high=[179,60,255]).
          # His sampling found grass S median 111 / V p95 188, so V>=200 + S<=60
          # cleanly separates paint from grass. Auto-cal still overrides v_min
          # at startup; this is the fallback / pre-warmup value.
          h_min:   0
          h_max: 179
          s_min:   0
          s_max:  60
          v_min: 200
          v_max: 255
        orange:                   # IGVC traffic barrels
          h_min:   5
          h_max:  20
          s_min: 130
          s_max: 255
          v_min: 100
          v_max: 255

    # ---- Perception loop (machine outputs) -------------------------------
    perception:
      fps: 20.0                   # publishes /bev/segmentation, drivable_mask, obstacle_mask
      downsample_depth: 2         # 1 = full res, 2 = half, 4 = quarter

      # v3.2 — Process all 3 cameras concurrently using a ThreadPoolExecutor.
      # Orin has 12 CPU cores; this is essentially free and cuts seg latency
      # by ~2-3x. Set false to debug serial behavior.
      parallel_cameras: true

    # ---- Visualization loop (BGR images for humans) ----------------------
    viz:
      enabled: true               # set false for race runs to save CPU/network
      fps: 2.0                    # /bev/image_raw, /bev/fused publish rate
      publish_debug: true         # also publish /bev/debug/<cam>
      overlay_alpha: 0.5

    # ---- Output mask shaping --------------------------------------------
    output:
      # Dilate the obstacle mask by this many BEV pixels so the planner
      # has built-in safety margin around real obstacles.
      # v3.2 default raised 4 -> 8 (40 cm margin) because tank/differential
      # drive needs more clearance to turn around obstacles than swerve.
      obstacle_dilate_px: 8

      # v3.2 — Lane-line detection threshold for /bev/lane_lines_detected.
      # When fewer than N lane-line pixels are present in the BEV mask, the
      # boolean topic publishes false, signaling the planner to switch to
      # GPS-waypoint mode for the IGVC offroad section.
      lane_min_pixels: 200

      # v3.2 — Publish per-frame perception loop time on
      # /bev/perception_latency_ms (std_msgs/Float32) for monitoring.
      publish_latency: true
